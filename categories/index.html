<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - 个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>个人网站</h1>
    </header>
    <main>
        
<style>
    .page-header {
        text-align: center;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #e0e0e0;
    }
    .page-header h2 {
        font-size: 2rem;
        color: #2c3e50;
        margin-bottom: 0.5rem;
    }
    .page-header p {
        color: #666;
        font-size: 1.1rem;
    }
    .back-link {
        display: inline-block;
        margin-bottom: 1rem;
        color: #3498db;
        text-decoration: none;
        font-weight: 500;
    }
    .back-link:hover {
        text-decoration: underline;
    }
    .article-list {
        max-width: 800px;
        margin: 0 auto;
    }
    .article-item {
        background: white;
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transition: transform 0.2s ease;
    }
    .article-item:hover {
        transform: translateX(5px);
    }
    .article-item h3 {
        margin-bottom: 0.5rem;
    }
    .article-item h3 a {
        color: #2c3e50;
        text-decoration: none;
        transition: color 0.2s ease;
    }
    .article-item h3 a:hover {
        color: #3498db;
    }
    .article-meta {
        color: #999;
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
    }
    .article-summary {
        color: #666;
        line-height: 1.6;
    }
</style>
